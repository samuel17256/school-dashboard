<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="/src/output.css">
</head>

<body class="h-screen overflow-hidden">
    <div class="relative z-10 min-h-screen bg-cover bg-center bg-no-repeat"
        style="background-image: url('../assets/Group 11.png')">
        <div class="absolute bg-black/4 w-full h-full pointer-events-none"></div>
        <div class="flex items-center justify-center p-8 float-end">
            <div class="w-full max-w-lg">
                <img src="../assets/British School 1.png" alt="">
                <h2 class="text-3xl font-bold text-[#5a6580] mt-8">Registration Form</h2>
                <p class="mt-4 text-[#5a6580]">Already have an account? <span class="text-amber-300 font-bold cursor-pointer">Login</span></p>
                <form class="space-y-4 z-50 mt-18">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <input type="text"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent"
                                placeholder="First Name">
                        </div>
                        <div>
                            <input type="text"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent"
                                placeholder="Last Name">
                        </div>
                    </div>

                    <div>
                        <input type="email"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent"
                            placeholder="Enter Email">
                    </div>

                    <div>
                        <input type="email"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent"
                            placeholder="Confirm Email">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <input type="text"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent"
                                placeholder="Phone Number">
                        </div>
                        <div>
                            <input type="text"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent"
                                placeholder="Token">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 items-center">
                        <div class="flex space-x-6">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="gender" value="male"
                                    class="mr-2 text-gray-600 focus:ring-gray-500">
                                <span class="text-gray-700">Male</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="gender" value="female"
                                    class="mr-2 text-gray-600 focus:ring-gray-500">
                                <span class="text-gray-700">Female</span>
                            </label>
                        </div>
                        <div>
                            <select
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent">
                                <option value="">Select Department</option>
                                <option value="science">Science</option>
                                <option value="arts">Arts</option>
                                <option value="commerce">Commerce</option>
                                <option value="technology">Technology</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-center mt-18">
                       <a href="dashboard.html" class="no-underline">
                         <button  type="button"
                            class="flex items-center gap-4 text-lg text-white bg-linear-to-r from-[#9cb7b2] via-[#dcb053] to-[#9cb7b2] px-6 py-4 rounded-full uppercase cursor-pointer">
                            <img src="../assets/Group 3login-btn.svg" alt="login">
                            Register
                        </button>
                       </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
