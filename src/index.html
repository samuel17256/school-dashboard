<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management Dasshboard</title>
    <link rel="stylesheet" href="/src/output.css">
</head>

<body>
    <div class="relative min-h-screen bg-cover bg-center bg-no-repeat"
        style="background-image: url('../assets/Background.png')">
        <div class="absolute bg-black/4 w-full h-full"></div>
        <!-- Navbar -->
        <nav class="relative z-10 container mx-auto px-4 pt-4">
            <div class="flex justify-between items-center">
                <div>
                    <img src="../assets/British School 1.png" alt="logo">
                </div>
                <div class="flex gap-6 text-[#3b5b80] text-lg">
                    <a href="#" class="no-underline border-2 border-red-600">Programs</a>
                    <a href="#" class="no-underline">Extra curriculum</a>
                </div>
                <div class="flex gap-6 items-center">
                    <div class="flex gap-6 text-white text-lg">
                        <a href="#" class="no-underline">Our Staff</a>
                        <a href="#" class="no-underline">Gallery</a>
                    </div>
                    <div>
                        <a href="#" class="no-underline">
                            <button
                                class="flex items-center gap-4 text-lg text-white bg-linear-to-r from-[#9cb7b2] via-[#dcb053] to-[#9cb7b2] px-6 py-2 rounded-full">
                                <img src="../assets/Group 3login-btn.svg" alt="login">
                                Login/Register
                            </button>
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="relative z-10">
            <div>
                <img src="../assets/Group 11 (1).png" alt="">
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Error amet, harum vitae soluta quaerat, a
                    assumenda numquam reprehenderit quasi illo maxime adipisci, animi tenetur perspiciatis aliquam aut
                    cumque et laudantium.</p>
                <div>
                    <a href="#" class="no-underline">
                        <button
                            class="flex items-center gap-4 text-lg text-[#3b5b80] bg-linear-to-r from-[#9cb7b2] via-[#dcb053] to-[#9cb7b2] px-6 py-4 rounded-full uppercase">
                            <img src="../assets/Group 3join-btn.svg" alt="login">
                            Join us today
                        </button>
                    </a>
                    <p>
                        <img src="../assets/Group 4play.svg" alt="video">
                        <span>Watch our welcome video</span>
                    </p>
                </div>
            </div>
        </section>

    </div>
</body>

</html>
